name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to attach the release to (leave empty for a draft build only).'
        required: false

permissions:
  contents: write

env:
  BIN: aweme-db-decrypt

jobs:
  build:
    name: build (${{ matrix.tag }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: macos-arm64
            target: aarch64-apple-darwin
            runner: macos-14
          - tag: macos-x86_64
            target: x86_64-apple-darwin
            runner: macos-13
          - tag: linux-x86_64
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            apt: musl-tools
          - tag: linux-arm64
            target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            apt: musl-tools
          - tag: windows-x86_64
            target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: .exe
          - tag: windows-arm64
            target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux deps
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${BIN}${{ matrix.ext }}"
          dst="dist/${BIN}-${{ matrix.tag }}${{ matrix.ext }}"
          cp "$src" "$dst"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN }}-${{ matrix.tag }}
          path: dist/${{ env.BIN }}-${{ matrix.tag }}*
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd dist
          sha256sum ${BIN}-* > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/${{ env.BIN }}-*
            dist/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true
